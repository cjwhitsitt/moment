<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moment Photo Booth - Download Your GIF</title>
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0b0813 0%, #170d24 50%, #050308 100%);
      --accent-color: #a855f7;
      --accent-glow: rgba(168, 85, 247, 0.4);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(to right, #f3f4f6, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    p.subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .preview-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 28px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-gif {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      border-top-color: var(--accent-color);
      animation: spin 1s ease-in-out infinite;
    }

    .download-btn {
      width: 100%;
      padding: 16px 32px;
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: #ffffff;
      background: var(--accent-color);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      outline: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 20px var(--accent-glow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .download-btn:hover {
      background: #b566ff;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(168, 85, 247, 0.6);
    }

    .download-btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .error-container {
      display: none;
      padding: 16px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 16px;
      color: #fca5a5;
      font-size: 0.95rem;
      font-weight: 400;
      margin-bottom: 24px;
    }

    footer {
      margin-top: 32px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.2);
      font-weight: 300;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px;
        border-radius: 24px;
      }
      h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1 id="page-title">Your Moment</h1>
      <p class="subtitle" id="page-subtitle">Ready to save and share</p>
    </header>

    <div id="error-box" class="error-container"></div>

    <div class="preview-container">
      <div id="gif-loader" class="loader"></div>
      <img id="gif-element" class="preview-gif" alt="Moment Photo Booth Capture">
    </div>

    <button id="download-btn" class="download-btn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      Download GIF
    </button>

    <footer>
      Powered by Moment Multi-Camera Booth
    </footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const gifUrl = urlParams.get('gif');

      const loader = document.getElementById('gif-loader');
      const gifImg = document.getElementById('gif-element');
      const downloadBtn = document.getElementById('download-btn');
      const errorBox = document.getElementById('error-box');

      if (!gifUrl) {
        loader.style.display = 'none';
        errorBox.textContent = 'No GIF capture link provided. Please scan the QR code displayed on the Operator Dashboard.';
        errorBox.style.display = 'block';
        return;
      }

      // Preload image
      gifImg.src = gifUrl;
      gifImg.onload = () => {
        loader.style.display = 'none';
        gifImg.style.display = 'block';
        downloadBtn.removeAttribute('disabled');
      };

      gifImg.onerror = () => {
        loader.style.display = 'none';
        errorBox.textContent = 'Failed to load the captured GIF. The link might be expired or invalid.';
        errorBox.style.display = 'block';
      };

      // Direct download trigger using Blob-fetching to bypass CORS inline opening behavior
      downloadBtn.addEventListener('click', async () => {
        const originalText = downloadBtn.innerHTML;
        try {
          downloadBtn.disabled = true;
          downloadBtn.style.opacity = '0.7';
          downloadBtn.innerHTML = `
            <div class="loader" style="width:16px;height:16px;border-width:2px;display:inline-block;margin-right:6px;vertical-align:middle;"></div>
            Downloading...
          `;

          const response = await fetch(gifUrl);
          if (!response.ok) throw new Error('Network response error');
          const blob = await response.blob();
          const blobUrl = URL.createObjectURL(blob);

          const link = document.createElement('a');
          link.href = blobUrl;
          link.download = 'moment_' + Date.now() + '.gif';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(blobUrl);
        } catch (error) {
          console.error('Blob download failed, falling back to direct tab link:', error);
          // Fallback to direct download in new window
          window.open(gifUrl, '_blank');
        } finally {
          downloadBtn.disabled = false;
          downloadBtn.style.opacity = '1';
          downloadBtn.innerHTML = originalText;
        }
      });
    });
  </script>
</body>
</html>
